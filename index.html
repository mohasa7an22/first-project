<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="./javascript/app.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
    <title>BlackJack</title>
  </head>
  <body>
    <main class="blackjack">
      <h3>BlackJack</h3>

      <section class="game-board">
        <nav class="game-btn">
          <button id="btnStart">Start</button>
          <button id="btnHit">Hit me</button>
          <button id="btnStay">Stay</button>
        </nav>

        <nav class="bet-btn">
          <button id="five" class="btn-bet">5P</button>
          <button id="ten" class="btn-bet">10P</button>
          <button id="twoFive" class="btn-bet">25P</button>
          <button id="Fifty" class="btn-bet">50P</button>
          <button id="allIn">All in</button>
          <button id="btnClearBet">Clear investment</button>
          <button id="splitBtn">Split</button>
        </nav>
      </section>

      <section class="status"></section>

      <article id="deck">
        <p>Cards left: <strong id="cards">52</strong></p>
      </article>

      <section id="player"></section>
    </main>
  </body>
</html>
